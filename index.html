<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tell me</title>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function () {
      emailjs.init("V6DNmhoM7eZn6G6Pd");
    })();
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0b0b0b, #8b0000);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: rgba(0, 0, 0, 0.85);
      padding: 25px;
      border-radius: 12px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 0 25px rgba(196, 0, 0, 0.6);
    }

    .question {
      text-align: center;
      font-size: 1.35rem;
      color: #ff3b3b;
      margin-bottom: 20px;
      font-weight: bold;
    }

    input,
    button {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border-radius: 8px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    input {
      background: #0b0b0b;
      border: 2px solid #c40000;
      color: white;
      outline: none;
    }

    input::placeholder {
      color: #bbb;
    }

    button {
      border: none;
      background: #c40000;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 15px;
      font-size: 1rem;
      font-weight: bold;
    }

    #upiLink {
      display: none;
      text-decoration: none;
    }

    #popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #popupBox {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      width: 100%;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 0 20px rgba(196, 0, 0, 0.4);
    }

    #popupBox h3 {
      margin-top: 0;
      margin-bottom: 15px;
      color: #ff4d4d;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="question">would you give me some money</div>

    <input id="answer" placeholder="Type yes or no" />

    <button onclick="openPopup()">Check</button>

    <div class="result" id="result"></div>

    <a id="upiLink" href="#">
      <button type="button">Pay Now</button>
    </a>

    <audio id="happy" src="happy.mpeg"></audio>
    <audio id="sad" src="sad.mp3"></audio>
  </div>

  <div id="popup">
    <div id="popupBox">
      <h3>Enter Details</h3>

      <input id="name" placeholder="Your Name" />
      <input id="city" placeholder="Your City" />
      <input id="amount" type="number" placeholder="Enter Amount ₹" min="1" />

      <button onclick="submitData()">Submit</button>
    </div>
  </div>

  <script>
    function openPopup() {
      const answer = document.getElementById("answer").value.toLowerCase().trim();
      const result = document.getElementById("result");
      const link = document.getElementById("upiLink");

      if (answer !== "yes" && answer !== "no") {
        result.textContent = "type yes or no only";
        result.style.color = "#ffaa00";
        link.style.display = "none";
        return;
      }

      document.getElementById("popup").style.display = "flex";
    }

    function submitData() {
      const name = document.getElementById("name").value.trim();
      const city = document.getElementById("city").value.trim();
      const amount = document.getElementById("amount").value.trim();
      const answer = document.getElementById("answer").value.toLowerCase().trim();

      const result = document.getElementById("result");
      const link = document.getElementById("upiLink");
      const happy = document.getElementById("happy");
      const sad = document.getElementById("sad");

      if (!name || !city) {
        alert("Enter name and city");
        return;
      }

      if (answer === "yes" && (!amount || Number(amount) <= 0)) {
        alert("Enter valid amount");
        return;
      }

      emailjs.send(
        "service_fb7yvfc",
        "template_h309p5d",
        {
          name: name,
          city: city,
          answer: answer,
          amount: amount || "0"
        },
        "V6DNmhoM7eZn6G6Pd"
      ).then(
        function(response) {
          console.log("SUCCESS!", response.status, response.text);
        },
        function(error) {
          console.log("FAILED...", error);
        }
      );

      document.getElementById("popup").style.display = "none";

      if (answer === "yes") {
        result.textContent = "Click below to pay 👇";
        result.style.color = "#00ff88";

        const upi = `upi://pay?pa=9817506079@upi&pn=Nitin&am=${amount}&cu=INR`;
        link.href = upi;
        link.style.display = "block";

        happy.currentTime = 0;
        happy.play().catch(() => {});
      } 
      else if (answer === "no") {
        result.textContent = "okay, no problem";
        result.style.color = "#ff3b3b";
        link.style.display = "none";

        sad.currentTime = 0;
        sad.play().catch(() => {});
      } 
      else {
        result.textContent = "type yes or no only";
        result.style.color = "#ffaa00";
        link.style.display = "none";
      }
    }
  </script>

</body>
</html>
