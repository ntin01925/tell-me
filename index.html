<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>tell me</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function () {
  emailjs.init("V6DNmhoM7eZn6G6Pd");
})();
</script>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #0b0b0b, #8b0000);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  color: white;
}

.container {
  background: rgba(0,0,0,0.85);
  padding: 30px;
  border-radius: 15px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 0 30px rgba(196,0,0,0.7);
  text-align: center;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

.question {
  font-size: 1.4rem;
  color: #ff4d4d;
  margin-bottom: 20px;
  font-weight: bold;
}

input, button {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  margin-bottom: 15px;
  transition: 0.3s;
}

input {
  background: #111;
  border: 2px solid #c40000;
  color: white;
}

button {
  background: #c40000;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
  background: #ff1a1a;
}

.result {
  margin: 10px 0;
  font-weight: bold;
  min-height: 20px;
}

#upiLink {
  display: none;
}

#popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

#popupBox {
  background: #111;
  padding: 25px;
  border-radius: 12px;
  width: 300px;
  animation: fadeIn 0.5s ease;
}
</style>
</head>

<body>

<div class="container">
  <div class="question">would you give me some money</div>

  <input id="answer" placeholder="Type yes or no" />

  <button onclick="handleAnswer()">Check</button>

  <div class="result" id="result"></div>

  <a id="upiLink" href="#">
    <button>Pay Now</button>
  </a>

  <audio id="happy" src="happy.mpeg"></audio>
  <audio id="sad" src="sad.mp3"></audio>
</div>

<!-- Popup -->
<div id="popup">
  <div id="popupBox">
    <h3>Enter Details</h3>

    <input id="name" placeholder="Your Name" />
    <input id="city" placeholder="Your City" />
    <input id="amount" type="number" placeholder="Enter Amount ₹" />

    <button onclick="submitData()">Continue</button>
  </div>
</div>

<script>
function handleAnswer() {
  const answer = document.getElementById("answer").value.toLowerCase().trim();
  const result = document.getElementById("result");
  const sad = document.getElementById("sad");
  const link = document.getElementById("upiLink");

  if (answer === "yes") {
    document.getElementById("popup").style.display = "flex";
  } 
  else if (answer === "no") {
    result.textContent = "okay, no problem 👍";
    result.style.color = "#ff3b3b";

    link.style.display = "none";

    sad.currentTime = 0;
    sad.play().catch(()=>{});
  } 
  else {
    result.textContent = "type yes or no only";
    result.style.color = "#ffaa00";
  }
}

function submitData() {
  const name = document.getElementById("name").value.trim();
  const city = document.getElementById("city").value.trim();
  const amount = document.getElementById("amount").value.trim();
  const answer = document.getElementById("answer").value.toLowerCase().trim();

  const result = document.getElementById("result");
  const link = document.getElementById("upiLink");
  const happy = document.getElementById("happy");

  if (!name || !city || !amount) {
    alert("Fill all fields");
    return;
  }

  // Email send
  emailjs.send("service_fb7yvfc", "template_h309p5d", {
    name, city, answer, amount
  }, "V6DNmhoM7eZn6G6Pd");

  document.getElementById("popup").style.display = "none";

  result.textContent = "Click below to pay 👇";
  result.style.color = "#00ff88";

  const upi = `upi://pay?pa=9817506079@upi&pn=Nitin&am=${amount}&cu=INR`;

  link.href = upi;
  link.style.display = "block";

  happy.currentTime = 0;
  happy.play().catch(()=>{});
}
</script>

</body>
</html>
