<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Me</title>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function () {
      emailjs.init("V6DNmhoM7eZn6G6Pd");
    })();
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0b0b0b, #8b0000);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
    }

    .container {
      background: rgba(0,0,0,0.85);
      padding: 30px;
      border-radius: 15px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 0 30px rgba(196,0,0,0.7);
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }

    .question {
      font-size: 1.4rem;
      color: #ff4d4d;
      margin-bottom: 20px;
      font-weight: bold;
    }

    input, button {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 15px;
      transition: 0.3s;
      box-sizing: border-box;
    }

    input {
      background: #111;
      border: 2px solid #c40000;
      color: white;
      outline: none;
    }

    input:focus {
      border-color: #ff4d4d;
      box-shadow: 0 0 10px rgba(255, 77, 77, 0.3);
    }

    button {
      background: #c40000;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      transform: scale(1.05);
      background: #ff1a1a;
    }

    .result {
      margin: 10px 0;
      font-weight: bold;
      min-height: 25px;
    }

    #upiLink {
      display: none;
      text-decoration: none;
    }

    /* Popup Styles */
    #popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #popupBox {
      background: #111;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      border: 1px solid #c40000;
      animation: fadeIn 0.4s ease;
    }

    h3 {
      margin-top: 0;
      color: #ff4d4d;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="question">Would you give me some money?</div>

    <input id="answer" placeholder="Type yes or no" />

    <button onclick="handleAnswer()">Check</button>

    <div class="result" id="result"></div>

    <a id="upiLink" href="#">
      <button style="background: #00ff88; color: #000;">Pay Now</button>
    </a>

    <audio id="happy" src="happy.mpeg"></audio>
    <audio id="sad" src="sad.mp3"></audio>
  </div>

  <div id="popup">
    <div id="popupBox">
      <h3>Enter Details</h3>
      <input id="userName" placeholder="Your Name" />
      <input id="userCity" placeholder="Your City" />
      <input id="userAmount" type="number" placeholder="Enter Amount ₹" />
      <button onclick="submitData()">Continue to Payment</button>
      <button onclick="closePopup()" style="background:transparent; border:1px solid #444; font-size: 0.8rem; margin-top: -5px;">Cancel</button>
    </div>
  </div>

  <script>
    function handleAnswer() {
      const answer = document.getElementById("answer").value.toLowerCase().trim();
      const result = document.getElementById("result");
      const sad = document.getElementById("sad");
      const link = document.getElementById("upiLink");

      if (answer === "yes") {
        document.getElementById("popup").style.display = "flex";
      } 
      else if (answer === "no") {
        result.textContent = "Okay, no problem 👍";
        result.style.color = "#ff3b3b";
        link.style.display = "none";

        sad.currentTime = 0;
        sad.play().catch(() => { console.log("Audio play blocked by browser"); });
      } 
      else {
        result.textContent = "Please type 'yes' or 'no' only";
        result.style.color = "#ffaa00";
      }
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }

    function submitData() {
      const name = document.getElementById("userName").value.trim();
      const city = document.getElementById("userCity").value.trim();
      const amount = document.getElementById("userAmount").value.trim();
      const answer = document.getElementById("answer").value.trim();

      const result = document.getElementById("result");
      const link = document.getElementById("upiLink");
      const happy = document.getElementById("happy");

      if (!name || !city || !amount) {
        alert("Please fill in all the details.");
        return;
      }

      // 1. Send data via EmailJS
      emailjs.send("service_fb7yvfc", "template_h309p5d", {
        name: name,
        city: city,
        answer: answer,
        amount: amount
      }).then(() => {
          console.log("Email sent successfully!");
      }, (error) => {
          console.log("Email failed...", error);
      });

      // 2. Hide popup
      document.getElementById("popup").style.display = "none";

      // 3. Setup the UPI Link
      const upiId = "9817506079@upi";
      const payeeName = "Nitin";
      const note = `From ${name} - ${city}`;

      // Constructing the UPI URL with URL Encoding for safety
      const finalUpiUrl = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(payeeName)}&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;

      // 4. Show the Pay Now button
      result.textContent = "Thank you! Click below to pay 👇";
      result.style.color = "#00ff88";
      
      link.href = finalUpiUrl;
      link.style.display = "block";

      // 5. Play happy sound
      happy.currentTime = 0;
      happy.play().catch(() => { console.log("Audio play blocked"); });
    }
  </script>

</body>
</html>
